<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Grid Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#1f242d;
    color:white;
}

/* Dashboard Layout */
.dashboard{
    display:grid;
    grid-template-columns:250px 1fr;
    grid-template-rows:70px 1fr;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    grid-row:1/3;
    background:#2d333b;
    padding:20px;
}

/* Navbar */
.navbar{
    background:#2d333b;
    display:flex;
    align-items:center;
    padding:0 20px;
}

/* Content */
.content{
    padding:20px;
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:20px;
}

.card{
    height:120px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
}

.card:nth-child(1){background:#007bff;}
.card:nth-child(2){background:#28a745;}
.card:nth-child(3){background:#ffc107;color:black;}
.card:nth-child(4){background:#dc3545;}

/* Main Section */
.main-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap: 20px;
}

.chart,
.map{
        background:#2d333b;
    height:400px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    
}

.chart img,
.map img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:8px;
    padding:10px;
}

.chart svg,
.map svg{
    width:100%;
    height:100%;
    border-radius:8px;
    padding:6px;
}
/* Responsive */
@media(max-width:768px){

    .dashboard{
        grid-template-columns:1fr;
        grid-template-rows:auto;
    }

    .sidebar{
        grid-row:auto;
    }

    .cards{
        grid-template-columns:repeat(2,1fr);
    }

    .main-grid{
        grid-template-columns:1fr;
    }
}
</style>

</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Sidebar</h2>
    </aside>

    <header class="navbar">
        <h2>Navbar</h2>
    </header>

    <main class="content">

        <div class="cards">
            <div class="card">150</div>
            <div class="card">50%</div>
            <div class="card">44</div>
            <div class="card">65</div>
        </div>

        <div class="main-grid">
            <div class="chart"><img src="https://study.com/cimages/videopreview/videopreview-full/tv9zue1qcr.jpg" alt="Stacked area chart"></div>
            <div class="map"><img src="https://www.shutterstock.com/shutterstock/photos/60568018/display_1500/stock-vector-editable-vector-map-of-a-generic-residential-area-60568018.jpg" alt="Map view"></div>
        </div>

    </main>

</div>

</body>
</html>
