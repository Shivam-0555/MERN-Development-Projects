<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#dcdcdc;
    }

    .card{
      width:320px;
      background:white;
      border-radius:15px;
      overflow:hidden;

      position:relative;
    }

    .image-box{
      position:relative;
    }

    .image-box img{
      width:100%;
      display:block;
    }

    /* SALE TAG */
    .sale{
      position:absolute;
      top:10px;
      left:10px;

      background:red;
      color:black;
      padding:8px 14px;
      border-radius:8px;
      font-size:14px;
      font-weight:bold;
    }

    /* HEART ICON */
    .heart{
      position:absolute;
      top:10px;
      right:10px;

      width:40px;
      height:40px;
      background:white;
      border-radius:50%;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:20px;
      cursor:pointer;
    }

    .content{
      padding:18px;
    }

    h2{
      font-size:22px;
      margin-bottom:10px;
    }

    .price{
      color:green;
      font-size:28px;
      font-weight:bold;
      margin-bottom:20px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      background:black;
      color:white;
      font-size:18px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#333;
    }

  </style>
</head>
<body>

  <div class="card">

    <div class="image-box">

      <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcROCXBUAzZfbU2lT3Jwl6tIO_-MM8OIa74iiKLbckK5yTzPVZ3L1j8fbJ0TX2whzPnGr87NEO9rtoEIvf57Kn1Vfk-ht42bO42I4zQhDEajyKGpo-dm-OXmMHo" alt="shoes">

      <div class="sale">SALE</div>

      <div class="heart">❤️</div>

    </div>

    <div class="content">

      <h2>Running Shoes</h2>

      <div class="price">₹2999</div>

      <button>Add to Cart</button>

    </div>

  </div>

</body>
</html>
